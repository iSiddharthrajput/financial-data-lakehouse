name: dbt CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read # Set least-privilege: this workflow only needs to read repository files

jobs:
  dbt_ci:
    name: Build and Test dbt Models
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Terminate the job if hung for more than 15 minutes to save action minutes

    steps:
      - name: 📁 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest apache-airflow --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.3/constraints-3.11.txt"

      - name: 🧪 Run DAG Import Smoke Tests
        run: |
          pytest tests/

      - name: ⚙️ Setup dbt Profile
        run: |
          mkdir -p ~/.dbt
          cat << EOF > ~/.dbt/profiles.yml
          financial_lakehouse:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                database: ${{ secrets.SNOWFLAKE_DATABASE }}
                schema: BRONZE
                threads: 4
          EOF
          chmod 600 ~/.dbt/profiles.yml # Restrict read/write permissions on profiles file

      - name: 🔍 Debug dbt Connection
        run: |
          cd dbt
          dbt debug

      - name: 🏗️ Compile dbt Project
        run: |
          cd dbt
          dbt compile

      - name: 🧹 Clean up credentials
        if: always() # Guarantee cleanup executes even if preceding dbt tests fail
        run: rm -rf ~/.dbt/profiles.yml
