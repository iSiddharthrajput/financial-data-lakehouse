name: dbt CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read # Set least-privilege: this workflow only needs to read repository files

jobs:
  dbt_checks:
    name: 🏗️ Build and Compile dbt Models
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📁 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dbt Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ⚙️ Setup dbt Profile
        run: |
          mkdir -p ~/.dbt
          cat << EOF > ~/.dbt/profiles.yml
          financial_lakehouse:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                database: ${{ secrets.SNOWFLAKE_DATABASE }}
                schema: BRONZE
                threads: 4
          EOF
          chmod 600 ~/.dbt/profiles.yml

      - name: 🔍 Debug dbt Connection
        run: |
          cd dbt
          dbt debug

      - name: 🏗️ Compile dbt Project
        run: |
          cd dbt
          dbt compile

      - name: 🧹 Clean up credentials
        if: always()
        run: rm -rf ~/.dbt/profiles.yml

  airflow_checks:
    name: 🧪 Run Airflow DAG Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📁 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Airflow & Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest apache-airflow apache-airflow-providers-snowflake --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.3/constraints-3.11.txt"
          pip install --upgrade typing-extensions

      - name: 🧪 Run DAG Import Smoke Tests
        run: |
          pytest tests/
